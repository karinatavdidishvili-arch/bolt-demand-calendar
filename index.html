<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolt · Demand Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f5f5f5;color:#1a1a1a;font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;}
  .topbar{background:#1c2b1c;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:44px;position:sticky;top:0;z-index:200;}
  .topbar-logo{color:#fff;font-weight:700;font-size:15px;letter-spacing:-0.02em;}
  .topbar-title{color:#aaa;font-size:13px;margin-left:16px;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .filter-panel{background:#fff;border-radius:8px;padding:14px 20px;margin:14px 16px 0;border:1px solid #e8e8e8;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .filter-label{font-size:10px;font-weight:600;color:#888;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;}
  .pill{padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#555;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif;white-space:nowrap;}
  .pill:hover{border-color:#aaa;color:#222;}
  .pill.active{background:#1c2b1c;border-color:#1c2b1c;color:#fff;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;}
  .cal-nav-title{font-size:18px;font-weight:700;letter-spacing:-0.03em;}
  .nav-btn{background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 14px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;color:#555;}
  .nav-btn:hover{background:#f0f0f0;}
  .legend{display:flex;align-items:center;gap:12px;padding:0 20px 10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .cal-wrap{margin:0 16px 24px;background:#fff;border-radius:8px;border:1px solid #e8e8e8;overflow:hidden;}
  .cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:#1c2b1c;}
  .cal-header-cell{padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#9ab;letter-spacing:0.06em;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .day{min-height:90px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:6px;position:relative;cursor:pointer;transition:background .1s;}
  .day:hover{background:#fafafa;}
  .day.other-month{background:#fafafa;}
  .day.other-month .day-num{color:#ccc;}
  .day.today{background:#f0faf5;}
  .day.today .day-num{background:#22a06b;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
  .day-num{font-size:12px;font-weight:600;color:#333;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
  .day-num.weekend{color:#999;}
  .event-pill{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block;letter-spacing:0.01em;}
  .more-events{font-size:9px;color:#888;margin-top:1px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:none;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:12px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
  .modal-date{font-size:13px;color:#888;margin-bottom:4px;}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-0.03em;}
  .modal-event{padding:10px 12px;border-radius:8px;margin-bottom:8px;}
  .modal-event-type{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
  .modal-event-name{font-size:14px;font-weight:600;margin-bottom:3px;}
  .modal-event-desc{font-size:12px;color:#666;line-height:1.5;}
  .modal-impact{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:5px;}
  .impact-high{background:#fff0f0;color:#c00;}
  .impact-med{background:#fff8e1;color:#b45309;}
  .impact-low{background:#f0faf5;color:#1c5e38;}
  .modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#888;margin-top:-4px;}
</style>
</head>

  {date:"2026-06-18",city:"Barcelona",type:"Cultural Event",name:"Sónar — Day 1",desc:"Jun 18–20. ~120k total. Sónar by Night at Fira Gran Via until 06:00.",impact:"HIGH"},
  {date:"2026-06-19",city:"Barcelona",type:"Cultural Event",name:"Sónar — Day 2",desc:"Extreme late-night demand L'Hospitalet area.",impact:"HIGH"},
  {date:"2026-06-20",city:"Barcelona",type:"Cultural Event",name:"Sónar — Day 3 (Final)",desc:"Full day + night programme.",impact:"HIGH"},
  {date:"2026-06-23",city:"Barcelona",type:"Festival",name:"Sant Joan Eve — Barcelona",desc:"Biggest night of the year. Bonfires across all beaches. Extremely high demand 22:00–04:00.",impact:"HIGH"},
  {date:"2026-06-24",city:"Barcelona",type:"Regional Holiday",name:"Sant Joan — Barcelona",desc:"Regional holiday. Continued beach activity.",impact:"MED"},
  {date:"2026-07-08",city:"Barcelona",type:"Cultural Event",name:"Cruïlla Festival — Day 1",desc:"Jul 8–11. Parc del Fòrum. ~30k/day.",impact:"MED"},
  {date:"2026-09-11",city:"Barcelona",type:"Cultural Event",name:"Diada de Catalunya",desc:"Catalan National Day. Large demonstrations on Passeig de Gràcia.",impact:"MED"},
  {date:"2026-09-24",city:"Barcelona",type:"Festival",name:"La Mercè Festival",desc:"Sep 19–25. Barcelona's biggest city festival. Free concerts, human towers, fire runs.",impact:"HIGH"},
  {date:"2026-03-29",city:"Sevilla",type:"Festival",name:"Semana Santa — Sevilla",desc:"Mar 29–Apr 5. Biggest Holy Week in Spain. Road closures throughout historic centre.",impact:"HIGH"},
  {date:"2026-04-20",city:"Sevilla",type:"Festival",name:"Feria de Abril — Sevilla",desc:"Apr 20–26. 1,000+ casetas. Los Remedios. High late-night demand all week.",impact:"HIGH"},
  {date:"2026-04-24",city:"Sevilla",type:"Sports Event",name:"MotoGP Jerez — Day 1",desc:"Apr 24–26. ~150k total. High demand Sevilla ↔ Jerez corridor.",impact:"HIGH"},
  {date:"2026-04-25",city:"Sevilla",type:"Sports Event",name:"MotoGP Jerez — Qualifying",desc:"Strong demand Sevilla ↔ Jerez.",impact:"MED"},

  {date:"2026-10-12",city:"Zaragoza",type:"Festival",name:"Fiestas del Pilar — National Day (peak)",desc:"Oct 12 = National Day + peak of Fiestas del Pilar. Biggest single day of the year.",impact:"HIGH"},

const TODAY = new Date();
let state = {city:"All Cities",group:"All",year:2026,month:4};

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_OF_WEEK=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function getActiveCities(){
  if(state.group==="LTO") return LTO_CITIES;
  if(state.group==="Non-LTO") return NON_LTO_CITIES;
  if(state.city!=="All Cities") return [state.city];
  return [...LTO_CITIES,...NON_LTO_CITIES];
}

function getEventsForDate(dateStr){
  const activeCities=getActiveCities();
  return EVENTS.filter(e=>{
    if(e.date!==dateStr) return false;
    if(e.city==="National"||e.city==="Supply") return true;
    return activeCities.includes(e.city);
  });
}

function eventColor(e){
  if(e.city==="National") return {bg:"#dcfce7",color:"#166534"};
  if(e.city==="Supply") return {bg:"#fff7ed",color:"#c2410c"};
  return {bg:CITY_BG[e.city]||"#f3f4f6",color:CITY_COLORS[e.city]||"#374151"};
}

function impactLabel(impact){
  if(impact==="HIGH") return {cls:"impact-high",label:"⚡ High Impact"};
  if(impact==="MED") return {cls:"impact-med",label:"⚠ Medium Impact"};
  return {cls:"impact-low",label:"↓ Low Impact"};
}

function pad(n){return String(n).padStart(2,"0");}
function dateStr(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}

function buildCalendar(){
  const {year,month,group}=state;
  const firstDay=new Date(year,month,1);
  let startDow=firstDay.getDay();
  startDow=startDow===0?6:startDow-1;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevMonthDays=new Date(year,month,0).getDate();

  const groupPills=["All","LTO","Non-LTO"].map(g=>{
    const isActive=group===g;
    const badge=g==="LTO"?`<span style="font-size:9px;background:rgba(34,160,107,0.2);color:#166534;padding:1px 5px;border-radius:8px;margin-left:4px;">Madrid·BCN·Málaga</span>`:g==="Non-LTO"?`<span style="font-size:9px;background:rgba(0,0,0,0.07);color:#666;padding:1px 5px;border-radius:8px;margin-left:4px;">8 cities</span>`:"";
    return `<button class="pill${isActive?' active':''}" onclick="setGroup('${g}')">${g}${badge}</button>`;
  }).join("");

  const activeCitiesForPills=group==="LTO"?LTO_CITIES:group==="Non-LTO"?NON_LTO_CITIES:CITIES.filter(c=>c!=="All Cities");
  const cityPills=activeCitiesForPills.map(c=>{
    const isActive=group==="All"&&state.city===c;
    return `<button class="pill${isActive?' active':''}" onclick="setCity('${c}')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CITY_COLORS[c]};margin-right:4px;"></span>${c}</button>`;
  }).join("");

  let cells="";
  const rows=Math.ceil((startDow+daysInMonth)/7);
  for(let i=0;i<rows*7;i++){
    let dayNum,currentMonth=true,cellYear=year,cellMonth=month;
    if(i<startDow){dayNum=prevMonthDays-startDow+i+1;currentMonth=false;cellMonth=month-1;if(cellMonth<0){cellMonth=11;cellYear=year-1;}}
    else if(i>=startDow+daysInMonth){dayNum=i-startDow-daysInMonth+1;currentMonth=false;cellMonth=month+1;if(cellMonth>11){cellMonth=0;cellYear=year+1;}}
    else{dayNum=i-startDow+1;}
    const ds=dateStr(cellYear,cellMonth,dayNum);
    const events=getEventsForDate(ds);
    const isToday=ds===`${TODAY.getFullYear()}-${pad(TODAY.getMonth()+1)}-${pad(TODAY.getDate())}`;
    const dow=i%7;
    const isWeekend=dow>=5;
    let eventPills="";
    events.slice(0,2).forEach((e,idx)=>{
      const {bg,color}=eventColor(e);
      const eidx=EVENTS.indexOf(e);
      eventPills+=`<span class="event-pill" style="background:${bg};color:${color};cursor:pointer;" onclick="event.stopPropagation();openEventModal(${eidx})"><strong>${e.type}:</strong> ${e.name}</span>`;
    });
    if(events.length>2) eventPills+=`<div class="more-events" style="cursor:pointer;" onclick="event.stopPropagation();openDayModal('${ds}')">+${events.length-2} more</div>`;
    cells+=`<div class="day${!currentMonth?' other-month':''}${isToday?' today':''}"><div class="day-num${isWeekend?' weekend':''}">${dayNum}</div>${eventPills}</div>`;
  }

  let monthEvents=0;
  for(let d=1;d<=daysInMonth;d++) monthEvents+=getEventsForDate(dateStr(year,month,d)).length;

  document.getElementById("root").innerHTML=`
    <div class="topbar">
      <div style="display:flex;align-items:center;">
        <span class="topbar-logo">Bolt</span>
        <div style="width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 14px;"></div>
        <span class="topbar-title">Demand Calendar 2026</span>
      </div>
      <div class="topbar-right"><span style="background:#22a06b;color:#fff;font-size:11px;font-weight:500;padding:4px 10px;border-radius:4px;">${monthEvents} events this month</span></div>
    </div>
    <div class="filter-panel" style="flex-direction:column;align-items:flex-start;gap:10px;">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%;"><span class="filter-label" style="min-width:60px;">Group</span>${groupPills}</div>
      <div style="width:100%;height:1px;background:#f0f0f0;"></div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;"><span class="filter-label" style="min-width:60px;">City</span>${cityPills}</div>
    </div>
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevMonth()">← Previous</button>
      <div class="cal-nav-title">${MONTHS[month]} ${year}</div>
      <button class="nav-btn" onclick="nextMonth()">Next →</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-header">${DAYS_OF_WEEK.map(d=>`<div class="cal-header-cell">${d}</div>`).join("")}</div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}

function renderEventHtml(e){
  const {bg,color}=eventColor(e);
  const imp=impactLabel(e.impact);
  return `<div class="modal-event" style="background:${bg};"><div class="modal-event-type" style="color:${color};">${e.type} · ${e.city==="National"?"🇪🇸 National":e.city==="Supply"?"⚠ Supply":e.city}</div><div class="modal-event-name">${e.name}</div><div class="modal-event-desc">${e.desc}</div><span class="modal-impact ${imp.cls}">${imp.label}</span></div>`;
}

function openEventModal(idx){
  const e=EVENTS[idx];if(!e)return;
  const d=new Date(e.date+"T12:00:00");
  const dateLabel=d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("modal-content").innerHTML=`<button class="modal-close" onclick="closeModal()">✕</button><div class="modal-date">${dateLabel}</div><div class="modal-title">${e.name}</div>${renderEventHtml(e)}`;
  document.getElementById("modal-overlay").classList.add("open");
}

function openDayModal(ds){
  const events=getEventsForDate(ds);if(!events.length)return;
  const d=new Date(ds+"T12:00:00");
  const dateLabel=d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("modal-content").innerHTML=`<button class="modal-close" onclick="closeModal()">✕</button><div class="modal-date">${dateLabel}</div><div class="modal-title">${events.length} events on this day</div>${events.map(e=>renderEventHtml(e)).join("")}`;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(e){if(!e||e.target===document.getElementById("modal-overlay")) document.getElementById("modal-overlay").classList.remove("open");}
function setGroup(g){state.group=g;state.city="All Cities";buildCalendar();}
function setCity(c){state.city=c;state.group="All";buildCalendar();}
function prevMonth(){state.month--;if(state.month<0){state.month=11;state.year--;}buildCalendar();}
function nextMonth(){state.month++;if(state.month>11){state.month=0;state.year++;}buildCalendar();}

state.month=TODAY.getMonth();
state.year=TODAY.getFullYear()<2026?2026:TODAY.getFullYear();
if(state.year>2026)state.year=2026;
buildCalendar();
</script>
</body>
</html>
