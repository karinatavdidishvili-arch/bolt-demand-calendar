<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolt · Demand Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f5f5f5;color:#1a1a1a;font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;}

  /* TOPBAR */
  .topbar{background:#1c2b1c;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:44px;position:sticky;top:0;z-index:200;}
  .topbar-logo{color:#fff;font-weight:700;font-size:15px;letter-spacing:-0.02em;}
  .topbar-title{color:#aaa;font-size:13px;margin-left:16px;}
  .topbar-right{display:flex;align-items:center;gap:10px;}

  /* FILTER PANEL */
  .filter-panel{background:#fff;border-radius:8px;padding:14px 20px;margin:14px 16px 0;border:1px solid #e8e8e8;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .filter-label{font-size:10px;font-weight:600;color:#888;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;}
  .pill{padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#555;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif;white-space:nowrap;}
  .pill:hover{border-color:#aaa;color:#222;}
  .pill.active{background:#1c2b1c;border-color:#1c2b1c;color:#fff;}
  .divider{width:1px;height:22px;background:#e8e8e8;flex-shrink:0;}

  /* NAV */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;margin:0 0;}
  .cal-nav-title{font-size:18px;font-weight:700;letter-spacing:-0.03em;}
  .nav-btn{background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 14px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;color:#555;}
  .nav-btn:hover{background:#f0f0f0;}

  /* LEGEND */
  .legend{display:flex;align-items:center;gap:12px;padding:0 20px 10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

  /* CALENDAR GRID */
  .cal-wrap{margin:0 16px 24px;background:#fff;border-radius:8px;border:1px solid #e8e8e8;overflow:hidden;}
  .cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:#1c2b1c;}
  .cal-header-cell{padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#9ab;letter-spacing:0.06em;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}

  /* DAY CELL */
  .day{min-height:90px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:6px;position:relative;cursor:pointer;transition:background .1s;}
  .day:hover{background:#fafafa;}
  .day.other-month{background:#fafafa;}
  .day.other-month .day-num{color:#ccc;}
  .day.today{background:#f0faf5;}
  .day.today .day-num{background:#22a06b;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
  .day-num{font-size:12px;font-weight:600;color:#333;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
  .day-num.weekend{color:#999;}
  .event-pill{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block;letter-spacing:0.01em;}
  .more-events{font-size:9px;color:#888;margin-top:1px;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:none;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:12px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
  .modal-date{font-size:13px;color:#888;margin-bottom:4px;}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-0.03em;}
  .modal-event{padding:10px 12px;border-radius:8px;margin-bottom:8px;}
  .modal-event-type{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
  .modal-event-name{font-size:14px;font-weight:600;margin-bottom:3px;}
  .modal-event-desc{font-size:12px;color:#666;line-height:1.5;}
  .modal-impact{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:5px;}
  .impact-high{background:#fff0f0;color:#c00;}
  .impact-med{background:#fff8e1;color:#b45309;}
  .impact-low{background:#f0faf5;color:#1c5e38;}
  .modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#888;margin-top:-4px;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .day{animation:fadeIn .2s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ─── CITY CONFIG ─────────────────────────────────────────────────────────────
const CITIES = ["All Cities","Madrid","Barcelona","Málaga","Valencia","Alicante","Zaragoza","Toledo","A Coruña","Sevilla","Pamplona","Murcia"];
const LTO_CITIES = ["Madrid","Barcelona","Málaga"];
const NON_LTO_CITIES = ["Valencia","Alicante","Zaragoza","Toledo","A Coruña","Sevilla","Pamplona","Murcia"];

const CITY_COLORS = {
  "All Cities": "#1c2b1c",
  "Madrid":     "#166534",
  "Barcelona":  "#1d4ed8",
  "Málaga":     "#b45309",
  "Valencia":   "#c2410c",
  "Alicante":   "#0e7490",
  "Zaragoza":   "#7c3aed",
  "Toledo":     "#92400e",
  "A Coruña":   "#065f46",
  "Sevilla":    "#b91c1c",
  "Pamplona":   "#1e40af",
  "Murcia":     "#6d28d9",
};

const CITY_BG = {
  "Madrid":    "#dcfce7","Barcelona": "#dbeafe","Málaga":    "#fef3c7",
  "Valencia":  "#ffedd5","Alicante":  "#cffafe","Zaragoza":  "#ede9fe",
  "Toledo":    "#fef9c3","A Coruña":  "#d1fae5","Sevilla":   "#fee2e2",
  "Pamplona":  "#dbeafe","Murcia":    "#ede9fe",
  "National":  "#f0fdf4","Supply":    "#fff7ed",
};

// ─── EVENT TYPES ─────────────────────────────────────────────────────────────
// impact: HIGH / MED / LOW
// type: HOLIDAY | FESTIVAL | SPORT | SUPPLY | CULTURAL

// ─── GOOGLE SHEETS CONFIG ────────────────────────────────────────────────────
const SHEET_ID = "1qICzhX0KZ-tk8f3YIRlmve0v8OLGC2-9-Qr6mEi60og";
const SHEET_NAME = "Bolt Demand Calendar 2026 — Events";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQf3lgu6lM8w8viKUVw8KfAHwbmwxjOSS9A9kta1fJi9At8TEksVu6tXt4Ucv2eODOR2BiG6D5lUnN4/pub?gid=1392331906&single=true&output=csv";

let EVENTS = [];

async function loadEvents() {
  document.getElementById("root").innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:80vh;flex-direction:column;gap:12px;color:#888;">
      <div style="width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#22a06b;border-radius:50%;animation:spin .8s linear infinite;"></div>
      <div style="font-size:13px;">Loading events…</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    EVENTS = parseCSV(csv);
    loadEvents();
  } catch(err) {
    document.getElementById("root").innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:80vh;color:#c00;font-size:13px;">
        Failed to load events. Check that the Sheet is shared publicly.
      </div>`;
  }
}

function parseCSV(csv) {
  const lines = csv.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for(let i = 0; i < line.length; i++){
      const ch = line[i];
      if(ch === '"'){ inQ = !inQ; }
      else if(ch === ',' && !inQ){ cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || "").replace(/^"|"$/g, ""));
    return obj;
  }).filter(e => e.date && e.name);
}

// ─── STATE ───────────────────────────────────────────────────────────────────
const TODAY = new Date();
let state = {
  city: "All Cities",
  group: "All",
  year: 2026,
  month: 4,
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_OF_WEEK = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function getActiveCities(){
  if(state.group==="LTO") return LTO_CITIES;
  if(state.group==="Non-LTO") return NON_LTO_CITIES;
  // group=All: if a single city is selected use that
  if(state.city !== "All Cities") return [state.city];
  return [...LTO_CITIES, ...NON_LTO_CITIES];
}

function getEventsForDate(dateStr, city){
  const activeCities = getActiveCities();
  return EVENTS.filter(e => {
    if(e.date !== dateStr) return false;
    if(e.city === "National" || e.city === "Supply") return true;
    return activeCities.includes(e.city);
  });
}

function eventColor(e){
  if(e.city === "National") return {bg:"#dcfce7", color:"#166534"};
  if(e.city === "Supply")   return {bg:"#fff7ed", color:"#c2410c"};
  const bg = CITY_BG[e.city] || "#f3f4f6";
  const color = CITY_COLORS[e.city] || "#374151";
  return {bg, color};
}

function impactLabel(impact){
  if(impact==="HIGH") return {cls:"impact-high", label:"⚡ High Impact"};
  if(impact==="MED")  return {cls:"impact-med",  label:"⚠ Medium Impact"};
  return {cls:"impact-low", label:"↓ Low Impact"};
}

function pad(n){ return String(n).padStart(2,"0"); }
function dateStr(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function buildCalendar(){
  const {city, year, month} = state;

  const firstDay = new Date(year, month, 1);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // shift to Mon=0

  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();

  const {group} = state;
  const groupPills = ["All","LTO","Non-LTO"].map(g => {
    const isActive = group===g;
    const style = isActive ? "background:#1c2b1c;border-color:#1c2b1c;color:#fff;" : "";
    const badge = g==="All" ? "" : g==="LTO"
      ? `<span style="font-size:9px;background:rgba(34,160,107,0.2);color:#166534;padding:1px 5px;border-radius:8px;margin-left:4px;">Madrid · BCN · Málaga</span>`
      : `<span style="font-size:9px;background:rgba(0,0,0,0.07);color:#666;padding:1px 5px;border-radius:8px;margin-left:4px;">8 cities</span>`;
    return `<button class="pill${isActive?' active':''}" onclick="setGroup('${g}')" style="${style}">${g}${badge}</button>`;
  }).join("");

  const activeCitiesForPills = group==="LTO" ? LTO_CITIES : group==="Non-LTO" ? NON_LTO_CITIES : CITIES.filter(c=>c!=="All Cities");
  const cityPills = activeCitiesForPills.map(c => {
    const isActive = group==="All" && city===c;
    return `<button class="pill${isActive?' active':''}" onclick="setCity('${c}')">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CITY_COLORS[c]};margin-right:4px;"></span>${c}
    </button>`;
  }).join("");

  // Legend
  const legendItems = [
    {color:"#166534", bg:"#dcfce7", label:"National Holiday"},
    {color:"#c2410c", bg:"#fff7ed", label:"Supply Alert"},
    ...(city==="All Cities" ? Object.entries(CITY_COLORS).filter(([k])=>k!=="All Cities").slice(0,6).map(([k,v])=>({color:v,bg:CITY_BG[k]||"#f3f4f6",label:k})) : [{color:CITY_COLORS[city],bg:CITY_BG[city]||"#f3f4f6",label:city+" Event"}])
  ];

  const legendHtml = legendItems.map(l=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${l.color};"></div>
      ${l.label}
    </div>
  `).join("");

  // Build day cells
  let cells = "";
  let totalCells = startDow + daysInMonth;
  let rows = Math.ceil(totalCells/7);
  let totalSlots = rows*7;

  for(let i=0; i<totalSlots; i++){
    let dayNum, currentMonth=true, cellYear=year, cellMonth=month;
    if(i < startDow){
      dayNum = prevMonthDays - startDow + i + 1;
      currentMonth = false;
      cellMonth = month-1;
      if(cellMonth<0){cellMonth=11;cellYear=year-1;}
    } else if(i >= startDow + daysInMonth){
      dayNum = i - startDow - daysInMonth + 1;
      currentMonth = false;
      cellMonth = month+1;
      if(cellMonth>11){cellMonth=0;cellYear=year+1;}
    } else {
      dayNum = i - startDow + 1;
    }

    const ds = dateStr(cellYear, cellMonth, dayNum);
    const events = getEventsForDate(ds, city);
    const isToday = ds === `${TODAY.getFullYear()}-${pad(TODAY.getMonth()+1)}-${pad(TODAY.getDate())}`;
    const dow = i%7; // 0=Mon, 6=Sun
    const isWeekend = dow>=5;

    let eventPills = "";
    const maxShow = 2;
    events.slice(0,maxShow).forEach((e,idx)=>{
      const {bg,color} = eventColor(e);
      const eidx = EVENTS.indexOf(e);
      eventPills += `<span class="event-pill" style="background:${bg};color:${color};cursor:pointer;transition:opacity .15s;" onmouseenter="this.style.opacity='.75'" onmouseleave="this.style.opacity='1'" onclick="event.stopPropagation();openEventModal(${eidx})"><strong style="font-weight:700;">${e.type}:</strong> ${e.name}</span>`;
    });
    if(events.length > maxShow){
      const remaining = events.slice(maxShow);
      eventPills += `<div class="more-events" style="cursor:pointer;" onclick="event.stopPropagation();openDayModal('${ds}')"">+${events.length-maxShow} more</div>`;
    }

    const hasEvents = events.length > 0;
    cells += `
      <div class="day${!currentMonth?' other-month':''}${isToday?' today':''}"
        style="${!currentMonth?'':''}cursor:default;">
        <div class="day-num${isWeekend?' weekend':''}">${dayNum}</div>
        ${eventPills}
      </div>
    `;
  }

  // Count events this month
  let monthEvents = 0;
  for(let d=1;d<=daysInMonth;d++){
    monthEvents += getEventsForDate(dateStr(year,month,d), city).length;
  }

  document.getElementById("root").innerHTML = `
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:0;">
        <span class="topbar-logo">Bolt</span>
        <div style="width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 14px;"></div>
        <span class="topbar-title">Demand Calendar 2026</span>
      </div>
      <div class="topbar-right">
        <span style="background:#22a06b;color:#fff;font-size:11px;font-weight:500;padding:4px 10px;border-radius:4px;">
          ${monthEvents} events this month
        </span>
      </div>
    </div>

    <div class="filter-panel" style="flex-direction:column;align-items:flex-start;gap:10px;">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%;">
        <span class="filter-label" style="min-width:60px;">Group</span>
        ${groupPills}
      </div>
      <div style="width:100%;height:1px;background:#f0f0f0;"></div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;">
        <span class="filter-label" style="min-width:60px;">City</span>
        ${cityPills}
      </div>
    </div>

    <div class="cal-nav">
      <button class="nav-btn" onclick="prevMonth()">← Previous</button>
      <div class="cal-nav-title">${MONTHS[month]} ${year}</div>
      <button class="nav-btn" onclick="nextMonth()">Next →</button>
    </div>

    <div class="legend">${legendHtml}</div>

    <div class="cal-wrap">
      <div class="cal-header">
        ${DAYS_OF_WEEK.map(d=>`<div class="cal-header-cell">${d}</div>`).join("")}
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
  `;
}

function renderEventHtml(e){
  const {bg,color}=eventColor(e);
  const imp=impactLabel(e.impact);
  const cityLabel=e.city==="National"?"🇪🇸 National":e.city==="Supply"?"⚠ Supply":e.city;
  return `
    <div class="modal-event" style="background:${bg};">
      <div class="modal-event-type" style="color:${color};">${e.type} · ${cityLabel}</div>
      <div class="modal-event-name">${e.name}</div>
      <div class="modal-event-desc">${e.desc}</div>
      <span class="modal-impact ${imp.cls}">${imp.label}</span>
    </div>`;
}

function openEventModal(idx){
  const e = EVENTS[idx];
  if(!e) return;
  const d = new Date(e.date+"T12:00:00");
  const dateLabel = d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("modal-content").innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-date">${dateLabel}</div>
    <div class="modal-title">${e.name}</div>
    ${renderEventHtml(e)}
  `;
  document.getElementById("modal-overlay").classList.add("open");
}

function openDayModal(ds){
  const events = getEventsForDate(ds, state.city);
  if(!events.length) return;
  const d = new Date(ds+"T12:00:00");
  const dateLabel = d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("modal-content").innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-date">${dateLabel}</div>
    <div class="modal-title">${events.length} events on this day</div>
    ${events.map(e=>renderEventHtml(e)).join("")}
  `;
  document.getElementById("modal-overlay").classList.add("open");
}

function openModal(ds){
  openDayModal(ds);
}

function closeModal(e){
  if(!e || e.target===document.getElementById("modal-overlay")){
    document.getElementById("modal-overlay").classList.remove("open");
  }
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function setGroup(g){ state.group=g; state.city="All Cities"; buildCalendar(); }
function setCity(c){ state.city=c; state.group="All"; buildCalendar(); }
function prevMonth(){
  state.month--;
  if(state.month<0){state.month=11;state.year--;}
  buildCalendar();
}
function nextMonth(){
  state.month++;
  if(state.month>11){state.month=0;state.year++;}
  buildCalendar();
}

// Start on current month
state.month = TODAY.getMonth();
state.year = TODAY.getFullYear() < 2026 ? 2026 : TODAY.getFullYear();
if(state.year > 2026) state.year = 2026;
loadEvents();
</script>
</body>
</html>
